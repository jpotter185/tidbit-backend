services:
  tidbit:
    build: .
    container_name: tidbit-backend
    expose:
      - "6769"
    environment:
      - PORT=6769
      - API_KEY=${API_KEY}
      - GIN_MODE=release
      - SENSOR_DATA_FILE=/data/sensor_readings.jsonl
    volumes:
      - sensor-data:/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    external: true

volumes:
  sensor-data: